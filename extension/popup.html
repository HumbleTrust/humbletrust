<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HumbleTrust</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,255,65,0.04);
    }
    .logo {
      width: 32px;
      height: 32px;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      background: linear-gradient(135deg, #00FF41, #B026FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .title { font-weight: 800; font-size: 15px; color: #fff; }
    .subtitle { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; }

    .section { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    label { display: block; font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }
    input:focus { border-color: rgba(0,255,65,0.5); }
    input::placeholder { color: rgba(255,255,255,0.2); }

    .btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      border-radius: 8px;
      background: #00FF41;
      color: #000;
      font-weight: 700;
      font-size: 12px;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #00e63a; }
    .btn-outline {
      background: transparent;
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); color: #fff; }

    .msg { font-size: 11px; color: #00FF41; margin-top: 6px; min-height: 16px; }
    .msg.err { color: #FF4444; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #00FF41; box-shadow: 0 0 6px #00FF41; }
    .status-text { font-size: 11px; color: rgba(255,255,255,0.4); }

    .link-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
    }
    .link {
      flex: 1;
      text-align: center;
      padding: 7px;
      border-radius: 7px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .link:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .link.green { color: #00FF41; border-color: rgba(0,255,65,0.2); }
    .link.green:hover { background: rgba(0,255,65,0.08); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡</div>
    <div>
      <div class="title">HumbleTrust</div>
      <div class="subtitle">Token TrustScore · Solana</div>
    </div>
  </div>

  <div class="section">
    <label>API Key (optional — 50 free req/day without)</label>
    <input id="apiKey" type="text" placeholder="ht_live_…" />
    <button class="btn" id="saveBtn">Save Key</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="section">
    <label>Check a token</label>
    <input id="mintInput" type="text" placeholder="Paste mint address…" />
    <button class="btn btn-outline" id="checkBtn" style="margin-top:8px;">Check TrustScore</button>
    <div id="result" style="margin-top:10px;min-height:20px;"></div>
  </div>

  <div class="status-row">
    <span class="dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Auto-scanning active</span>
  </div>

  <div class="link-row">
    <a class="link green" href="https://humbletrust.vercel.app/api" target="_blank">Get PRO Key</a>
    <a class="link" href="https://humbletrust.vercel.app" target="_blank">Open App</a>
    <a class="link" href="https://github.com/humbletrust/humbletrust" target="_blank">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
