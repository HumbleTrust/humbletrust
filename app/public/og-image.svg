<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05070F"/>
      <stop offset="100%" style="stop-color:#0E1424"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#19FB9B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <rect width="1200" height="630" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Orb effects -->
  <circle cx="200" cy="150" r="300" fill="rgba(153,69,255,0.06)"/>
  <circle cx="1000" cy="500" r="250" fill="rgba(0,212,255,0.04)"/>
  <circle cx="900" cy="100" r="200" fill="rgba(0,255,148,0.03)"/>

  <!-- Shield logo -->
  <g transform="translate(100,240)">
    <path d="M75,5 L145,30 L145,80 C145,115 75,145 75,145 C75,145 5,115 5,80 L5,30 Z"
      fill="rgba(0,255,148,0.08)" stroke="url(#brand)" stroke-width="3"/>
    <polyline points="45,85 68,108 110,62" stroke="#00FF94" stroke-width="6" fill="none"
      stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>

  <!-- Brand name -->
  <text x="270" y="292" font-family="system-ui, -apple-system, sans-serif" font-weight="800"
    font-size="72" fill="#00FF94" filter="url(#glow)">Humble</text>
  <text x="600" y="292" font-family="system-ui, -apple-system, sans-serif" font-weight="800"
    font-size="72" fill="url(#brand)">Trust</text>

  <!-- Tagline -->
  <text x="270" y="350" font-family="system-ui, -apple-system, sans-serif" font-weight="400"
    font-size="28" fill="rgba(122,144,176,0.9)">Trust &amp; Safety Infrastructure for Solana</text>

  <!-- Feature chips -->
  <g transform="translate(270,400)">
    <rect rx="20" width="160" height="38" fill="rgba(0,255,148,0.08)" stroke="rgba(0,255,148,0.2)" stroke-width="1"/>
    <text x="80" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#00FF94">Protected Launches</text>
  </g>
  <g transform="translate(448,400)">
    <rect rx="20" width="140" height="38" fill="rgba(153,69,255,0.08)" stroke="rgba(153,69,255,0.2)" stroke-width="1"/>
    <text x="70" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#9945FF">Zodiac Badge NFT</text>
  </g>
  <g transform="translate(606,400)">
    <rect rx="20" width="120" height="38" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#00D4FF">TrustScore</text>
  </g>
  <g transform="translate(744,400)">
    <rect rx="20" width="140" height="38" fill="rgba(255,219,43,0.08)" stroke="rgba(255,219,43,0.2)" stroke-width="1"/>
    <text x="70" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#FFD600">Live Market Data</text>
  </g>

  <!-- URL -->
  <text x="270" y="500" font-family="monospace" font-size="22" fill="rgba(78,96,128,0.8)">humbletrust.vercel.app</text>
</svg>
