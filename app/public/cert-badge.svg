<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF94"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#19FB9B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="none" stroke="url(#ring1)" stroke-width="2" opacity="0.6"/>

  <!-- Outer decorative rings -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#ring1)" stroke-width="1" opacity="0.25" stroke-dasharray="6 4"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="url(#ring2)" stroke-width="1.5" opacity="0.35"/>

  <!-- Hex shield shape -->
  <polygon points="200,60 270,100 270,180 200,220 130,180 130,100"
    fill="rgba(0,255,148,0.06)" stroke="url(#ring1)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="200,72 260,108 260,172 200,208 140,172 140,108"
    fill="rgba(0,255,148,0.04)" stroke="rgba(0,255,148,0.4)" stroke-width="1"/>

  <!-- Shield checkmark -->
  <path d="M180 138 L193 155 L222 126" stroke="#00FF94" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Certificate ribbon band -->
  <rect x="80" y="235" width="240" height="36" rx="6" fill="rgba(0,255,148,0.08)" stroke="rgba(0,255,148,0.2)" stroke-width="1"/>
  <text x="200" y="259" text-anchor="middle" font-family="'Space Grotesk', 'Outfit', system-ui, sans-serif"
    font-size="13" font-weight="700" fill="#00FF94" letter-spacing="2">LAUNCH CERTIFICATE</text>

  <!-- Main title -->
  <text x="200" y="295" text-anchor="middle" font-family="'Outfit', 'Space Grotesk', system-ui, sans-serif"
    font-size="22" font-weight="900" fill="#EDF2FA" letter-spacing="-0.5">HumbleTrust</text>

  <!-- Subtitle -->
  <text x="200" y="318" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace"
    font-size="10" fill="#4E6080" letter-spacing="2">TOKEN-2022 · NON-TRANSFERABLE</text>

  <!-- Bottom badges -->
  <rect x="82" y="340" width="68" height="22" rx="4" fill="rgba(0,255,148,0.1)" stroke="rgba(0,255,148,0.3)" stroke-width="1"/>
  <text x="116" y="355" text-anchor="middle" font-family="'Space Mono', monospace" font-size="8" fill="#00FF94" letter-spacing="1">DEVNET</text>

  <rect x="166" y="340" width="68" height="22" rx="4" fill="rgba(153,69,255,0.1)" stroke="rgba(153,69,255,0.3)" stroke-width="1"/>
  <text x="200" y="355" text-anchor="middle" font-family="'Space Mono', monospace" font-size="8" fill="#9945FF" letter-spacing="1">ANCHOR V2</text>

  <rect x="250" y="340" width="68" height="22" rx="4" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="284" y="355" text-anchor="middle" font-family="'Space Mono', monospace" font-size="8" fill="#00D4FF" letter-spacing="1">SOLANA</text>

  <!-- Corner dots decoration -->
  <circle cx="40" cy="40" r="3" fill="rgba(0,255,148,0.3)"/>
  <circle cx="360" cy="40" r="3" fill="rgba(153,69,255,0.3)"/>
  <circle cx="40" cy="360" r="3" fill="rgba(0,212,255,0.3)"/>
  <circle cx="360" cy="360" r="3" fill="rgba(0,255,148,0.3)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
</svg>
